# ─────────────────────────────────────────────
# Decap CMS — Configuration ACE-ULB
# ─────────────────────────────────────────────

backend:
  name: github
  repo: ACE-ULB/website
  branch: main
  # Authentification PKCE : ne nécessite pas de serveur OAuth.
  # Créer une GitHub OAuth App sur https://github.com/settings/developers
  #   - Homepage URL      : https://ace-ulb.be
  #   - Callback URL      : https://ace-ulb.be/admin/
  # Puis remplacer YOUR_OAUTH_CLIENT_ID par le Client ID obtenu.
  auth_type: pkce
  app_id: YOUR_OAUTH_CLIENT_ID

# Langue de l'interface
locale: fr

# Dossier où Decap CMS dépose les images uploadées (par défaut)
media_folder: public/static/img/uploads
public_folder: /static/img/uploads

# ─────────────────────────────────────────────
# COLLECTIONS
# ─────────────────────────────────────────────
collections:

  # ── 1. Page d'accueil ───────────────────────
  - name: home
    label: "🏠 Page d'accueil"
    files:
      - name: carousel
        label: "Carrousel de photos"
        file: src/data/home-carousel.json
        format: json
        description: >
          Ajoutez, supprimez ou réordonnez les photos du carrousel
          affiché sur la page d'accueil.
        fields:
          - name: photos
            label: Photos
            label_singular: Photo
            widget: list
            summary: "{{fields.image}}"
            fields:
              - name: image
                label: Image
                widget: image
                media_folder: /public/static/img/home
                public_folder: /static/img/home
                hint: >
                  Format recommandé : PNG ou JPEG, ratio 4:3,
                  minimum 800×600 px.

  # ── 2. Comité de l'année en cours ──────────
  - name: comite
    label: "👥 Comité"
    label_singular: "Année de comité"
    folder: src/assets/comite
    path: "{{year}}/comite"
    extension: md
    format: yaml-frontmatter
    create: true
    identifier_field: year
    summary: "Comité {{year}}"
    sortable_fields: [year]
    fields:
      - name: year
        label: Année académique
        widget: number
        value_type: int
        hint: "Ex : 2025 pour l'année 2024–2025"

      - &membre
        name: presidence
        label: Présidence
        widget: object
        fields:
          - {name: poste,  label: Poste,   widget: string, default: "Présidence"}
          - {name: nom,    label: Nom,     widget: string}
          - {name: cercle, label: Cercle,  widget: string}
          - name: img
            label: "Photo disponible ?"
            widget: boolean
            default: false
            hint: >
              Cochez si une photo existe dans
              src/assets/comite/{année}/photos/{poste}.png

      - <<: *membre
        name: vpe
        label: Vice-Présidence Externe
        fields:
          - {name: poste,  label: Poste,   widget: string, default: "Vice-Présidence Externe"}
          - {name: nom,    label: Nom,     widget: string}
          - {name: cercle, label: Cercle,  widget: string}
          - {name: img,    label: "Photo disponible ?", widget: boolean, default: false}

      - <<: *membre
        name: vpi
        label: Vice-Présidence Interne
        fields:
          - {name: poste,  label: Poste,   widget: string, default: "Vice-Présidence Interne"}
          - {name: nom,    label: Nom,     widget: string}
          - {name: cercle, label: Cercle,  widget: string}
          - {name: img,    label: "Photo disponible ?", widget: boolean, default: false}

      - <<: *membre
        name: tresorerie
        label: Trésorerie
        fields:
          - {name: poste,  label: Poste,   widget: string, default: "Trésorerie"}
          - {name: nom,    label: Nom,     widget: string}
          - {name: cercle, label: Cercle,  widget: string}
          - {name: img,    label: "Photo disponible ?", widget: boolean, default: false}

      - <<: *membre
        name: secretaire
        label: Secrétariat
        fields:
          - {name: poste,  label: Poste,   widget: string, default: "Secrétariat"}
          - {name: nom,    label: Nom,     widget: string}
          - {name: cercle, label: Cercle,  widget: string}
          - {name: img,    label: "Photo disponible ?", widget: boolean, default: false}

      - <<: *membre
        name: folklore-trez
        label: Folklore-Trésorerie
        fields:
          - {name: poste,  label: Poste,   widget: string, default: "Folklore-Trésorerie"}
          - {name: nom,    label: Nom,     widget: string}
          - {name: cercle, label: Cercle,  widget: string}
          - {name: img,    label: "Photo disponible ?", widget: boolean, default: false}

      - <<: *membre
