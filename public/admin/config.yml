        fields:
          - {name: poste,  label: Poste,   widget: string, default: "Culture"}
          - {name: nom,    label: Nom,     widget: string}
          - {name: cercle, label: Cercle,  widget: string}
          - {name: img,    label: "Photo disponible ?", widget: boolean, default: false}

      - <<: *membre
        name: "e&i"
        label: "Égalité & Inclusivité"
        fields:
          - {name: poste,  label: Poste,   widget: string, default: "Égalité & Inclusivité"}
          - {name: nom,    label: Nom,     widget: string}
          - {name: cercle, label: Cercle,  widget: string}
          - {name: img,    label: "Photo disponible ?", widget: boolean, default: false}

  # ── 3. Cercles ──────────────────────────────
  - name: cercles
    label: "🎓 Cercles"
    label_singular: Cercle
    folder: src/assets/cercles/md
    extension: md
    format: yaml-frontmatter
    create: true
    identifier_field: acronyme
    summary: "{{acronyme}} — {{cercle}}"
    sortable_fields: [acronyme, cercle, date]
    fields:
      - {name: acronyme,   label: Acronyme,          widget: string}
      - {name: cercle,     label: "Nom complet",      widget: string}
      - {name: website,    label: Site web,            widget: string,   required: false}
      - {name: facebook,   label: Facebook,            widget: string,   required: false}
      - {name: instagram,  label: Instagram,           widget: string,   required: false}
      - {name: brief,      label: "Description courte", widget: string}
      - name: baptismal
        label: Cercle baptismal ?
        widget: boolean
        default: false
      - {name: color,      label: Couleur (hex),       widget: color,    required: false}
      - {name: date,       label: "Année de fondation", widget: number,  value_type: int, required: false}

  # ── 4. Guildes ──────────────────────────────
  - name: guildes
    label: "🎵 Guildes"
    label_singular: Guilde
    folder: src/assets/guildes/md
    extension: md
    format: yaml-frontmatter
    create: true
    identifier_field: acronyme
    summary: "{{acronyme}} — {{cercle}}"
    fields:
      - {name: acronyme,  label: Acronyme,           widget: string}
      - {name: cercle,    label: "Nom complet",       widget: string}
      - {name: facebook,  label: Facebook,             widget: string,  required: false}
      - {name: instagram, label: Instagram,            widget: string,  required: false}
      - {name: brief,     label: "Description courte", widget: string}
      - {name: color,     label: Couleur (hex),        widget: color,   required: false}
